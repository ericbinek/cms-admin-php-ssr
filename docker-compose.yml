name: cms-admin-php-ssr

services:
  app:
    container_name: cms-admin-php-ssr
    build: .
    ports:
      - "5002:5002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "5002"
      API_BASE_URL: "${API_BASE_URL:-http://host.docker.internal:3002}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
